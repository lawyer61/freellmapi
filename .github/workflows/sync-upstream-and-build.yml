name: Sync upstream and build

"on":
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: write
  packages: write

concurrency:
  group: sync-upstream-and-build
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/freellmapi
  UPSTREAM_REPOSITORY: tashfeenahmed/freellmapi
  UPSTREAM_BRANCH: main

jobs:
  sync-and-build:
    name: Sync upstream and publish latest
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Merge upstream
        id: sync
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          before="$(git rev-parse HEAD)"
          git remote add upstream "https://github.com/${UPSTREAM_REPOSITORY}.git" 2>/dev/null || git remote set-url upstream "https://github.com/${UPSTREAM_REPOSITORY}.git"
          git fetch --no-tags upstream "$UPSTREAM_BRANCH"
          git merge --no-edit "upstream/$UPSTREAM_BRANCH"
          after="$(git rev-parse HEAD)"

          if [[ "$before" == "$after" ]]; then
            changed=false
          else
            changed=true
          fi

          echo "changed=$changed" >> "$GITHUB_OUTPUT"
          echo "source_sha=$after" >> "$GITHUB_OUTPUT"
          echo "source_short=${after:0:12}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3
        if: steps.sync.outputs.changed == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'

      - name: Log in to GHCR
        if: steps.sync.outputs.changed == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: steps.sync.outputs.changed == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ steps.sync.outputs.source_short }}
          cache-from: type=gha,scope=linux-amd64
          cache-to: type=gha,mode=max,scope=linux-amd64

      - name: Push synced main
        if: steps.sync.outputs.changed == 'true'
        run: git push origin HEAD:main
